services:
    app:
        container_name: vayro-app
        build:
            context: .
            dockerfile: Dockerfile
        image: vayro/laravel-app
        restart: unless-stopped
        working_dir: /var/www/
        volumes:
            - ./:/var/www
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - vayro

    nginx:
        container_name: vayro-nginx
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "8989:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/:/etc/nginx/conf.d/
        depends_on:
            - app
        networks:
            - vayro

    # postgresql
    pgsql:
        container_name: vayro-pgsql
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE:-vayro}
            POSTGRES_USER: ${DB_USERNAME:-vayro}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - ./.docker/pgsql/dbdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vayro} -d ${DB_DATABASE:-vayro}" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - vayro

    # queue
    queue:
        container_name: vayro-queue
        image: vayro/laravel-app
        restart: unless-stopped
        command: "php artisan queue:work"
        volumes:
            - ./:/var/www
        depends_on:
            - redis
            - app
        networks:
            - vayro

    # redis
    redis:
        container_name: vayro-redis
        image: redis:alpine
        restart: unless-stopped
        networks:
            - vayro

networks:
    vayro:
        driver: bridge
