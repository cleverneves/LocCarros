services:
    app:
        container_name: loccarros-app
        build:
            context: .
            dockerfile: Dockerfile
        image: loccarros/laravel-app
        restart: unless-stopped
        working_dir: /var/www/
        volumes:
            - ./:/var/www
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - loccarros

    nginx:
        container_name: loccarros-nginx
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "8989:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/:/etc/nginx/conf.d/
        depends_on:
            - app
        networks:
            - loccarros

    # postgresql
    pgsql:
        container_name: loccarros-pgsql
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE:-loccarros}
            POSTGRES_USER: ${DB_USERNAME:-loccarros}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - ./.docker/pgsql/dbdata:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-loccarros} -d ${DB_DATABASE:-loccarros}" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - loccarros

    # queue
    queue:
        container_name: loccarros-queue
        image: loccarros/laravel-app
        restart: unless-stopped
        command: "php artisan queue:work"
        volumes:
            - ./:/var/www
        depends_on:
            - redis
            - app
        networks:
            - loccarros

    # redis
    redis:
        container_name: loccarros-redis
        image: redis:alpine
        restart: unless-stopped
        networks:
            - loccarros

networks:
    loccarros:
        driver: bridge
